[phases.setup]
nixPkgs = ["nodejs", "npm", "php82", "php82Extensions.gd", "php82Extensions.imagick"]
nixLibs = ["libjpeg", "libpng", "freetype"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
